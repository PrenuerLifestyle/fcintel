<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
<!-- same nav -->
<div class="page-header">
  <h1>Contact <em>Us</em></h1>
  <p>Reach out for a free consultation. We're available 24/7.</p>
</div>
<section class="section">
  <div class="container" style="max-width:700px">
    <form action="https://formspree.io/f/yourformid" method="POST">
      <div style="margin-bottom:20px">
        <label style="display:block; margin-bottom:8px; color:var(--muted)">Full Name</label>
        <input type="text" name="name" required style="width:100%; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:#fff;">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block; margin-bottom:8px; color:var(--muted)">Email</label>
        <input type="email" name="email" required style="width:100%; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:#fff;">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block; margin-bottom:8px; color:var(--muted)">Message</label>
        <textarea name="message" rows="5" required style="width:100%; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:#fff;"></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </div>
</section>
<!-- footer -->
</body>
</html>
