<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cases - fcintel</title>
    <link rel="shortcut icon" href="/assets/images/logoIcon/favicon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
    <style>
        :root {
            --bg: #080c10; --surface: #0f1419; --card: #141920; --border: rgba(255,255,255,0.07);
            --primary: #248acc; --accent: #46e829; --text: #e2e8f0; --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
        .sidebar { background: #0f1419; border-right: 1px solid var(--border); min-height: 100vh; }
        .sidebar .nav-link { color: var(--muted); padding: 0.75rem 1rem; border-radius: 0.5rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(36,138,204,0.15); }
        .main-content { padding: 2rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
        .table-custom { color: var(--text); }
        .table-custom td { border-color: #1e2630; }
        .badge-pending { background: #fbbf24; color: #000; }
        .badge-progress { background: #248acc; color: #fff; }
        .badge-recovered { background: #46e829; color: #000; }
        .btn-primary { background: var(--primary); border: none; border-radius: 2rem; }
        .pagination .page-link { background: var(--card); border-color: var(--border); color: var(--text); }
        .pagination .active .page-link { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 col-md-3 p-0 sidebar">
                <div class="d-flex flex-column p-3">
                    <a href="index.html" class="text-white text-decoration-none fs-4 fw-bold mb-3">fc<span style="color:var(--primary);">intel</span></a>
                    <hr class="text-secondary">
                    <ul class="nav nav-pills flex-column">
                        <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                        <li class="nav-item"><a href="#" class="nav-link active"><i class="bi bi-folder"></i> My Cases</a></li>
                        <li class="nav-item"><a href="contact.html" class="nav-link"><i class="bi bi-plus-circle"></i> New Case</a></li>
                        <li class="nav-item mt-3"><a href="#" class="nav-link text-danger" id="signOutBtn"><i class="bi bi-box-arrow-right"></i> Sign Out</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-10 col-md-9 ms-auto main-content">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h2">My Cases</h1>
                    <span id="userEmail" class="text-muted"></span>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search cases...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="statusFilter">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="recovered">Recovered</option>
                        </select>
                    </div>
                </div>

                <div class="stat-card p-3">
                    <div class="table-responsive">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>Case ID</th>
                                    <th>Type</th>
                                    <th>Amount Lost</th>
                                    <th>Status</th>
                                    <th>Submitted</th>
                                    <th>Recovered</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="casesTable">
                                <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <nav class="mt-3">
                        <ul class="pagination justify-content-center" id="pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, limit, startAfter } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLavOembi_2egjQcshysiWqKZOwMka9aI",
            authDomain: "fcintel-1fa8c.firebaseapp.com",
            projectId: "fcintel-1fa8c",
            storageBucket: "fcintel-1fa8c.firebasestorage.app",
            messagingSenderId: "715533638753",
            appId: "1:715533638753:web:491d17796c411ecab9de20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentPage = 0;
        let lastVisible = null;
        let allCases = [];
        let filteredCases = [];
        const pageSize = 10;

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
        }

        async function loadCases() {
            const user = auth.currentUser;
            if (!user) return;

            const q = query(
                collection(db, 'cases'),
                where('userId', '==', user.uid),
                orderBy('submittedAt', 'desc')
            );
            
            const snap = await getDocs(q);
            allCases = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            filterAndDisplay();
        }

        function filterAndDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            filteredCases = allCases.filter(c => {
                const matchesSearch = c.name?.toLowerCase().includes(searchTerm) || 
                                     c.scamType?.toLowerCase().includes(searchTerm) ||
                                     c.id.includes(searchTerm);
                const matchesStatus = !statusFilter || c.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            displayPage(0);
        }

        function displayPage(page) {
            const start = page * pageSize;
            const end = start + pageSize;
            const pageCases = filteredCases.slice(start, end);

            let rows = '';
            pageCases.forEach(c => {
                const statusClass = c.status === 'recovered' ? 'badge-recovered' : 
                                   c.status === 'in-progress' ? 'badge-progress' : 'badge-pending';
                rows += `<tr>
                    <td>#${c.id.slice(-6)}</td>
                    <td>${c.scamType || 'N/A'}</td>
                    <td>${formatCurrency(c.amountLost)}</td>
                    <td><span class="badge ${statusClass}">${c.status || 'pending'}</span></td>
                    <td>${c.submittedAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                    <td>${c.recoveredAmount ? formatCurrency(c.recoveredAmount) : '—'}</td>
                    <td><a href="case-details.html?id=${c.id}" class="btn btn-sm btn-primary">View</a></td>
                </tr>`;
            });

            document.getElementById('casesTable').innerHTML = rows || '<tr><td colspan="7" class="text-center text-muted">No cases found</td></tr>';

            // Pagination
            const totalPages = Math.ceil(filteredCases.length / pageSize);
            let paginationHtml = '';
            for (let i = 0; i < totalPages; i++) {
                paginationHtml += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i+1}</a></li>`;
            }
            document.getElementById('pagination').innerHTML = paginationHtml;
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => filterAndDisplay());
        document.getElementById('statusFilter').addEventListener('change', () => filterAndDisplay());

        document.getElementById('pagination').addEventListener('click', (e) => {
            e.preventDefault();
            if (e.target.classList.contains('page-link')) {
                const page = parseInt(e.target.dataset.page);
                displayPage(page);
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('userEmail').textContent = user.email;
            loadCases();
        });

        document.getElementById('signOutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>
</body>
</html>
