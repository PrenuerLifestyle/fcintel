<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - fcintel</title>
    <link rel="shortcut icon" href="/assets/images/logoIcon/favicon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
    <style>
        :root {
            --bg: #080c10; --surface: #0f1419; --card: #141920; --border: rgba(255,255,255,0.07);
            --primary: #248acc; --accent: #46e829; --text: #e2e8f0; --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 2rem; padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .login-card h1 { font-family: 'Outfit', sans-serif; font-weight: 800; color: #fff; margin-bottom: 0.25rem; }
        .login-card h1 span { color: var(--primary); }
        .form-label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .form-control { background: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 0.75rem; padding: 0.75rem 1rem; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(36,138,204,0.25); }
        .btn-primary { background: var(--primary); border: none; padding: 0.75rem; border-radius: 2rem; font-weight: 600; width: 100%; transition: background 0.2s; }
        .btn-primary:hover { background: #1a7ab5; }
        .btn-link { color: var(--muted); text-decoration: none; font-size: 0.85rem; cursor: pointer; }
        .btn-link:hover { color: #fff; }
        .footer-links { margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .signup-link { color: var(--primary); font-weight: 600; text-decoration: none; }
        #spinner { background: rgba(8,12,16,0.9); z-index: 9999; }
    </style>
</head>
<body>
    <div id="spinner" class="position-fixed top-0 start-0 w-100 vh-100 d-none align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="login-card">
        <div class="text-center">
            <h1>fc<span>intel</span></h1>
            <div class="text-muted mb-4">Financial Crime Intelligence</div>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="btn-link" id="forgotPasswordLink">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" id="signInBtn">Sign In</button>
        </form>

        <div class="footer-links">
            <span class="text-muted">Don't have an Account?</span>
            <a href="register.html" class="signup-link">Sign Up</a>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal fade" id="resetModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-surface">
                <div class="modal-header">
                    <h5 class="modal-title">Reset Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">Enter your email address and we'll send you a password reset link.</p>
                    <input type="email" class="form-control" id="resetEmail" placeholder="your@email.com">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="sendResetBtn">Send Reset Link</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLavOembi_2egjQcshysiWqKZOwMka9aI",
            authDomain: "fcintel-1fa8c.firebaseapp.com",
            projectId: "fcintel-1fa8c",
            storageBucket: "fcintel-1fa8c.firebasestorage.app",
            messagingSenderId: "715533638753",
            appId: "1:715533638753:web:491d17796c411ecab9de20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const resetModal = new bootstrap.Modal(document.getElementById('resetModal'));
        
        function showToast(type, message) {
            iziToast[type]({ title: type, message: message, position: 'topRight', timeout: 3000 });
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;

            document.getElementById('spinner').classList.remove('d-none');
            
            try {
                await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showToast('error', error.message);
            } finally {
                document.getElementById('spinner').classList.add('d-none');
            }
        });

        // Forgot password
        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            resetModal.show();
        });

        document.getElementById('sendResetBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            if (!email) {
                showToast('error', 'Please enter your email');
                return;
            }
            
            try {
                await sendPasswordResetEmail(auth, email);
                resetModal.hide();
                showToast('success', 'Password reset email sent! Check your inbox.');
            } catch (error) {
                showToast('error', error.message);
            }
        });
    </script>
</body>
</html>
