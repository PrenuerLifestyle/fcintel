<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - fcintel</title>
    <link rel="shortcut icon" href="/assets/images/logoIcon/favicon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
    <style>
        :root {
            --bg: #080c10; --surface: #0f1419; --card: #141920; --border: rgba(255,255,255,0.07);
            --primary: #248acc; --accent: #46e829; --text: #e2e8f0; --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
        .sidebar { background: #0f1419; border-right: 1px solid var(--border); min-height: 100vh; }
        .sidebar .nav-link { color: var(--muted); padding: 0.75rem 1rem; border-radius: 0.5rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(36,138,204,0.15); }
        .main-content { padding: 2rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
        .table-custom { color: var(--text); }
        .table-custom td { border-color: #1e2630; }
        .badge-pending { background: #fbbf24; color: #000; }
        .badge-progress { background: #248acc; color: #fff; }
        .badge-recovered { background: #46e829; color: #000; }
        .btn-primary { background: var(--primary); border: none; border-radius: 2rem; padding: 0.5rem 1.5rem; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; color: var(--text); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 col-md-3 p-0 sidebar">
                <div class="d-flex flex-column p-3">
                    <a href="index.html" class="text-white text-decoration-none fs-4 fw-bold mb-3">fc<span style="color:var(--primary);">intel</span></a>
                    <hr class="text-secondary">
                    <ul class="nav nav-pills flex-column">
                        <li class="nav-item"><a href="#" class="nav-link active" id="navDashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" id="navCases"><i class="bi bi-folder"></i> All Cases</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" id="navUsers"><i class="bi bi-people"></i> Users</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" id="navMessages"><i class="bi bi-envelope"></i> Messages</a></li>
                        <li class="nav-item mt-3"><a href="#" class="nav-link text-danger" id="signOutBtn"><i class="bi bi-box-arrow-right"></i> Sign Out</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-10 col-md-9 ms-auto main-content">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h2" id="pageTitle">Admin Dashboard</h1>
                    <span id="adminEmail" class="text-muted"></span>
                </div>
                <div id="contentArea"></div>
            </div>
        </div>
    </div>

    <!-- Case Edit Modal -->
    <div class="modal fade" id="caseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Case</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="caseEditForm">
                        <input type="hidden" id="editCaseId">
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editStatus">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="recovered">Recovered</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Recovered Amount ($)</label>
                            <input type="number" class="form-control" id="editRecoveredAmount" min="0" step="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Internal Notes</label>
                            <textarea class="form-control" id="editNotes" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveCaseBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLavOembi_2egjQcshysiWqKZOwMka9aI",
            authDomain: "fcintel-1fa8c.firebaseapp.com",
            projectId: "fcintel-1fa8c",
            storageBucket: "fcintel-1fa8c.firebasestorage.app",
            messagingSenderId: "715533638753",
            appId: "1:715533638753:web:491d17796c411ecab9de20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const adminEmail = document.getElementById('adminEmail');
        const contentArea = document.getElementById('contentArea');
        const pageTitle = document.getElementById('pageTitle');
        const caseModal = new bootstrap.Modal(document.getElementById('caseModal'));

        function showToast(type, message) {
            iziToast[type]({ title: type, message: message, position: 'topRight', timeout: 3000 });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
        }

        // Check if user is admin
        async function checkAdmin(user) {
            // For demo, allow any logged in user
            // In production, check user.role === 'admin'
            return true;
        }

        // Load Dashboard
        async function loadDashboard() {
            pageTitle.textContent = 'Admin Dashboard';
            
            const casesSnap = await getDocs(collection(db, 'cases'));
            const usersSnap = await getDocs(collection(db, 'users'));
            
            const totalCases = casesSnap.size;
            const pendingCases = casesSnap.docs.filter(d => d.data().status === 'pending').length;
            const recoveredCases = casesSnap.docs.filter(d => d.data().status === 'recovered').length;
            const totalUsers = usersSnap.size;
            
            let totalRecovered = 0;
            casesSnap.forEach(doc => totalRecovered += doc.data().recoveredAmount || 0);

            contentArea.innerHTML = `
                <div class="row g-4 mb-4">
                    <div class="col-sm-6 col-lg-3"><div class="stat-card"><h6 class="text-muted">Total Cases</h6><h2 class="text-white">${totalCases}</h2></div></div>
                    <div class="col-sm-6 col-lg-3"><div class="stat-card"><h6 class="text-muted">Pending</h6><h2 class="text-white">${pendingCases}</h2></div></div>
                    <div class="col-sm-6 col-lg-3"><div class="stat-card"><h6 class="text-muted">Recovered</h6><h2 class="text-white">${recoveredCases}</h2></div></div>
                    <div class="col-sm-6 col-lg-3"><div class="stat-card"><h6 class="text-muted">Total Recovered</h6><h2 class="text-white">${formatCurrency(totalRecovered)}</h2></div></div>
                </div>
                <div class="stat-card p-3">
                    <h5 class="mb-3">Recent Cases</h5>
                    <div class="table-responsive">
                        <table class="table table-custom">
                            <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                            <tbody id="casesTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const tbody = document.getElementById('casesTable');
            let rows = '';
            casesSnap.docs.slice(0, 10).forEach(doc => {
                const data = doc.data();
                const statusClass = data.status === 'recovered' ? 'badge-recovered' : data.status === 'pending' ? 'badge-pending' : 'badge-progress';
                rows += `<tr>
                    <td>#${doc.id.slice(-6)}</td>
                    <td>${data.name || 'N/A'}</td>
                    <td>${data.scamType || 'N/A'}</td>
                    <td>${formatCurrency(data.amountLost)}</td>
                    <td><span class="badge ${statusClass}">${data.status || 'pending'}</span></td>
                    <td>${data.submittedAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary edit-case" data-id="${doc.id}">Edit</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = rows;
        }

        // Load All Cases
        async function loadCases() {
            pageTitle.textContent = 'All Cases';
            const q = query(collection(db, 'cases'), orderBy('submittedAt', 'desc'));
            const snap = await getDocs(q);
            
            let html = '<div class="stat-card p-3"><div class="table-responsive"><table class="table table-custom"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Type</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
            
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr>
                    <td>#${doc.id.slice(-6)}</td>
                    <td>${d.name || ''}</td>
                    <td>${d.email || ''}</td>
                    <td>${d.scamType || ''}</td>
                    <td>${formatCurrency(d.amountLost)}</td>
                    <td><span class="badge ${d.status === 'recovered' ? 'badge-recovered' : d.status === 'pending' ? 'badge-pending' : 'badge-progress'}">${d.status || 'pending'}</span></td>
                    <td>${d.submittedAt?.toDate().toLocaleDateString() || ''}</td>
                    <td><button class="btn btn-sm btn-primary edit-case" data-id="${doc.id}">Edit</button></td>
                </tr>`;
            });
            
            html += '</tbody></table></div></div>';
            contentArea.innerHTML = html;
        }

        // Load Users
        async function loadUsers() {
            pageTitle.textContent = 'Users';
            const snap = await getDocs(collection(db, 'users'));
            
            let html = '<div class="stat-card p-3"><div class="table-responsive"><table class="table table-custom"><thead><tr><th>UID</th><th>Email</th><th>Name</th><th>Phone</th><th>Joined</th><th>Role</th></tr></thead><tbody>';
            
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr>
                    <td>${doc.id.slice(0, 8)}...</td>
                    <td>${d.email || ''}</td>
                    <td>${d.displayName || ''}</td>
                    <td>${d.phone || ''}</td>
                    <td>${d.createdAt?.toDate().toLocaleDateString() || ''}</td>
                    <td>${d.role || 'client'}</td>
                </tr>`;
            });
            
            html += '</tbody></table></div></div>';
            contentArea.innerHTML = html;
        }

        // Load Messages
        async function loadMessages() {
            pageTitle.textContent = 'Contact Messages';
            const q = query(collection(db, 'cases'), where('status', '==', 'pending'), orderBy('submittedAt', 'desc'));
            const snap = await getDocs(q);
            
            let html = '<div class="stat-card p-3"><div class="table-responsive"><table class="table table-custom"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>Amount</th><th>Date</th></tr></thead><tbody>';
            
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr>
                    <td>${d.name || ''}</td>
                    <td>${d.email || ''}</td>
                    <td>${d.phone || ''}</td>
                    <td>${d.scamType || ''}</td>
                    <td>${formatCurrency(d.amountLost)}</td>
                    <td>${d.submittedAt?.toDate().toLocaleDateString() || ''}</td>
                </tr>`;
            });
            
            html += '</tbody></table></div></div>';
            contentArea.innerHTML = html;
        }

        // Edit case
        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('edit-case')) {
                const id = e.target.dataset.id;
                const docRef = doc(db, 'cases', id);
                const snap = await getDoc(docRef);
                const data = snap.data();
                
                document.getElementById('editCaseId').value = id;
                document.getElementById('editStatus').value = data.status || 'pending';
                document.getElementById('editRecoveredAmount').value = data.recoveredAmount || 0;
                document.getElementById('editNotes').value = data.notes || '';
                
                caseModal.show();
            }
        });

        document.getElementById('saveCaseBtn').addEventListener('click', async () => {
            const id = document.getElementById('editCaseId').value;
            const status = document.getElementById('editStatus').value;
            const recoveredAmount = parseFloat(document.getElementById('editRecoveredAmount').value) || 0;
            const notes = document.getElementById('editNotes').value;

            await updateDoc(doc(db, 'cases', id), { status, recoveredAmount, notes });
            caseModal.hide();
            showToast('success', 'Case updated');
            loadDashboard();
        });

        // Navigation
        document.getElementById('navDashboard').addEventListener('click', (e) => { e.preventDefault(); loadDashboard(); });
        document.getElementById('navCases').addEventListener('click', (e) => { e.preventDefault(); loadCases(); });
        document.getElementById('navUsers').addEventListener('click', (e) => { e.preventDefault(); loadUsers(); });
        document.getElementById('navMessages').addEventListener('click', (e) => { e.preventDefault(); loadMessages(); });

        // Auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            adminEmail.textContent = user.email;
            const isAdmin = await checkAdmin(user);
            if (!isAdmin) { window.location.href = 'dashboard.html'; return; }
            loadDashboard();
        });

        document.getElementById('signOutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>
</body>
</html>
