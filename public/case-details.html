<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Details - fcintel</title>
    <link rel="shortcut icon" href="/assets/images/logoIcon/favicon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
    <style>
        :root {
            --bg: #080c10; --surface: #0f1419; --card: #141920; --border: rgba(255,255,255,0.07);
            --primary: #248acc; --accent: #46e829; --text: #e2e8f0; --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 2rem; }
        .case-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .detail-row { display: flex; padding: 1rem 0; border-bottom: 1px solid var(--border); }
        .detail-label { width: 200px; color: var(--muted); }
        .detail-value { flex: 1; color: #fff; font-weight: 500; }
        .badge-pending { background: #fbbf24; color: #000; padding: 0.25rem 0.75rem; border-radius: 1rem; }
        .badge-progress { background: #248acc; color: #fff; padding: 0.25rem 0.75rem; border-radius: 1rem; }
        .badge-recovered { background: #46e829; color: #000; padding: 0.25rem 0.75rem; border-radius: 1rem; }
        .btn-primary { background: var(--primary); border: none; border-radius: 2rem; padding: 0.5rem 2rem; }
        .btn-outline-secondary { border: 1px solid var(--border); color: var(--muted); border-radius: 2rem; padding: 0.5rem 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="case-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Case Details <span id="caseIdDisplay" class="text-muted"></span></h1>
                <a href="dashboard.html" class="btn btn-outline-secondary">← Back</a>
            </div>

            <div id="caseDetails"></div>

            <!-- EVIDENCE SECTION (dynamically inserted by JS) -->
            <div id="evidenceSection"></div>

            <div class="mt-4" id="commentsSection">
                <h5 class="mb-3">Comments</h5>
                <div id="commentsList" class="mb-3"></div>
                <div class="input-group">
                    <input type="text" class="form-control" id="newComment" placeholder="Add a comment...">
                    <button class="btn btn-primary" id="addCommentBtn">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getFirestore, doc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLavOembi_2egjQcshysiWqKZOwMka9aI",
            authDomain: "fcintel-1fa8c.firebaseapp.com",
            projectId: "fcintel-1fa8c",
            storageBucket: "fcintel-1fa8c.firebasestorage.app",
            messagingSenderId: "715533638753",
            appId: "1:715533638753:web:491d17796c411ecab9de20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('id');

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
        }

        function showToast(type, message) {
            iziToast[type]({ title: type, message: message, position: 'topRight', timeout: 3000 });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            if (!caseId) { window.location.href = 'dashboard.html'; return; }

            const caseRef = doc(db, 'cases', caseId);
            
            onSnapshot(caseRef, (snap) => {
                if (!snap.exists()) { window.location.href = 'dashboard.html'; return; }
                
                const data = snap.data();
                if (data.userId !== user.uid) { window.location.href = 'dashboard.html'; return; }

                document.getElementById('caseIdDisplay').textContent = `#${caseId.slice(-6)}`;
                
                const statusClass = data.status === 'recovered' ? 'badge-recovered' : 
                                   data.status === 'in-progress' ? 'badge-progress' : 'badge-pending';
                const statusText = data.status ? data.status.toUpperCase() : 'PENDING';

                // Main details
                document.getElementById('caseDetails').innerHTML = `
                    <div class="detail-row"><div class="detail-label">Status</div><div class="detail-value"><span class="${statusClass}">${statusText}</span></div></div>
                    <div class="detail-row"><div class="detail-label">Name</div><div class="detail-value">${data.name || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Email</div><div class="detail-value">${data.email || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Phone</div><div class="detail-value">${data.phone || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Country</div><div class="detail-value">${data.country || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Scam Type</div><div class="detail-value">${data.scamType || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Amount Lost</div><div class="detail-value">${formatCurrency(data.amountLost)}</div></div>
                    <div class="detail-row"><div class="detail-label">Loss Date</div><div class="detail-value">${data.lossDate || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Police Contacted</div><div class="detail-value">${data.policeContact ? 'Yes' : 'No'}</div></div>
                    <div class="detail-row"><div class="detail-label">Submitted</div><div class="detail-value">${data.submittedAt?.toDate().toLocaleString() || 'N/A'}</div></div>
                    <div class="detail-row"><div class="detail-label">Description</div><div class="detail-value">${data.description || 'N/A'}</div></div>
                    ${data.recoveredAmount ? `<div class="detail-row"><div class="detail-label">Recovered</div><div class="detail-value text-accent">${formatCurrency(data.recoveredAmount)}</div></div>` : ''}
                `;

                // Evidence section
                if (data.evidence && data.evidence.length > 0) {
                    let evidenceHtml = '<div class="detail-row"><div class="detail-label">Evidence Files</div><div class="detail-value">';
                    data.evidence.forEach((url, i) => {
                        evidenceHtml += `<a href="${url}" target="_blank" class="d-block text-primary mb-1">📎 File ${i+1}</a>`;
                    });
                    evidenceHtml += '</div></div>';
                    document.getElementById('evidenceSection').innerHTML = evidenceHtml;
                } else {
                    document.getElementById('evidenceSection').innerHTML = '';
                }

                // Comments
                const comments = data.comments || [];
                let commentsHtml = '';
                comments.forEach(c => {
                    commentsHtml += `<div class="bg-card p-2 rounded mb-2"><small class="text-muted">${c.time?.toDate().toLocaleString() || 'Just now'}</small><p class="mb-0">${c.text}</p></div>`;
                });
                document.getElementById('commentsList').innerHTML = commentsHtml || '<p class="text-muted">No comments yet.</p>';
            });

            document.getElementById('addCommentBtn').addEventListener('click', async () => {
                const text = document.getElementById('newComment').value.trim();
                if (!text) return;
                
                await updateDoc(caseRef, {
                    comments: arrayUnion({
                        text: text,
                        time: new Date(),
                        userId: user.uid
                    })
                });
                document.getElementById('newComment').value = '';
                showToast('success', 'Comment added');
            });
        });
    </script>
</body>
</html>
