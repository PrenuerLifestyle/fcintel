<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - fcintel</title>
    <meta name="description" content="Create an account to manage your cases and recovery requests">

    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/images/logoIcon/favicon.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/images/logoIcon/my-logo.png">

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- iziToast -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">

    <style>
        :root {
            --bg:       #080c10;
            --surface:  #0f1419;
            --card:     #141920;
            --border:   rgba(255,255,255,0.07);
            --primary:  #248acc;
            --accent:   #46e829;
            --text:     #e2e8f0;
            --muted:    #64748b;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .register-card h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .register-card h1 span {
            color: var(--primary);
        }
        .register-card .subhead {
            color: var(--muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-label {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .form-control {
            background: var(--card);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(36,138,204,0.25);
            background: var(--card);
            color: #fff;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover {
            background: #1a7ab5;
            transform: translateY(-2px);
        }
        .footer-links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .signin-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .signin-link:hover {
            text-decoration: underline;
        }
        #spinner {
            background: rgba(8,12,16,0.9);
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="spinner" class="position-fixed top-0 start-0 w-100 vh-100 d-none align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="register-card">
        <div class="text-center">
            <h1>fc<span>intel</span></h1>
            <div class="subhead">Financial Crime Intelligence</div>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="+1234567890" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
                <label for="password_confirmation" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="password_confirmation" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" id="registerBtn">Sign Up</button>
        </form>

        <div class="footer-links">
            <span class="text-muted">Already have an account?</span>
            <a href="login.html" class="signin-link">Sign In</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLavOembi_2egjQcshysiWqKZOwMka9aI",
            authDomain: "fcintel-1fa8c.firebaseapp.com",
            projectId: "fcintel-1fa8c",
            storageBucket: "fcintel-1fa8c.firebasestorage.app",
            messagingSenderId: "715533638753",
            appId: "1:715533638753:web:491d17796c411ecab9de20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const spinner = document.getElementById('spinner');
        const registerForm = document.getElementById('registerForm');

        function showToast(type, message) {
            iziToast[type]({
                title: type === 'error' ? 'Error' : 'Success',
                message: message,
                position: 'topRight',
                timeout: 3000
            });
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirm = document.getElementById('password_confirmation').value.trim();

            if (!name || !email || !phone || !password || !confirm) {
                showToast('error', 'All fields are required.');
                return;
            }
            if (password !== confirm) {
                showToast('error', 'Passwords do not match.');
                return;
            }
            if (password.length < 6) {
                showToast('error', 'Password must be at least 6 characters.');
                return;
            }

            spinner.classList.remove('d-none');
            spinner.classList.add('d-flex');
            registerForm.querySelector('button[type="submit"]').disabled = true;

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Update profile with display name
                await updateProfile(user, { displayName: name });

                // Create user document in Firestore using UID as document ID
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    displayName: name,
                    phone: phone,
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    role: "client",
                    preferences: {
                        notifications: true,
                        language: "en",
                        theme: "dark"
                    }
                });

                showToast('success', 'Account created! Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Registration error:', error);
                let errorMessage = 'Registration failed. Please try again.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email already in use.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Use at least 6 characters.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                }
                showToast('error', errorMessage);
            } finally {
                spinner.classList.add('d-none');
                spinner.classList.remove('d-flex');
                registerForm.querySelector('button[type="submit"]').disabled = false;
            }
        });
    </script>
</body>
</html>
